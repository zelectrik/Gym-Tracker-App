services:
  postgres:
    image: postgres:16
    container_name: gym-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym_tracker
    ports:
      - "5432:5432"
    volumes:
      - gym_tracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gym_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gym_tracker_postgres_data:
